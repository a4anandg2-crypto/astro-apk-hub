<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmArT AStro HuB | Premium APKs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-flex">
            <a href="/" class="nav-logo" onclick="event.preventDefault(); goBack();">SmArT <span>AStro</span> HuB</a>
            <div>
                <div id="guest-controls"><button onclick="loginWithGoogle()" class="action-btn" style="padding: 8px 16px;">Admin Login</button></div>
                <div id="admin-controls" style="display:none; display:flex; gap:10px;">
                    <button onclick="document.getElementById('admin-modal').style.display='flex'" class="action-btn" style="padding: 8px 16px;">+ Add App</button>
                    <button onclick="logout()" style="background:transparent; color:white; border:none; cursor:pointer;">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div id="main-view" class="container">
        <div id="app-list" class="app-grid">
            </div>
    </div>

    <div id="details-view" class="container" style="display:none;">
        <button onclick="goBack()" style="background:transparent; color:var(--primary-orange); border:none; font-size:16px; font-weight:bold; cursor:pointer; margin-bottom:20px;">← Back to Home</button>
        <div id="dynamic-content"></div>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-box">
            <h2 style="margin-bottom:20px;">Add New App</h2>
            <input type="text" id="new-app-name" placeholder="App Name">
            <input type="text" id="new-app-icon" placeholder="Icon URL">
            <input type="text" id="new-app-link" placeholder="Download Link">
            <textarea id="new-app-desc" rows="4" placeholder="Description"></textarea>
            <div style="display:flex; gap:10px;">
                <button onclick="addNewApp()" class="action-btn">Save</button>
                <button onclick="document.getElementById('admin-modal').style.display='none'" style="width:100%; background:#334155; color:white; border:none; border-radius:12px; cursor:pointer;">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
